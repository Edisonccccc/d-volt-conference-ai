<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>D-Volt Conference AI Assistant — Card Tester</title>
<meta name="x-app-version" content="v0.3.0" />
<meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />
<style>
  /* =====================================================================
     Design tokens — light mode default, dark mode via prefers-color-scheme.
     Old variable names (--bg, --card, --ink, --muted, --soft, --accent,
     --accent-2, --border, --ok, --err, --chip) are preserved so existing
     inline styles in JS keep working.
     ===================================================================== */
  :root {
    --bg: #fafaf9;
    --card: #ffffff;
    --surface: var(--card);
    --surface-2: #f4f4f3;
    --ink: #18181b;
    --muted: #71717a;
    --soft: #a1a1aa;
    --border: rgba(0, 0, 0, 0.08);
    --border-strong: rgba(0, 0, 0, 0.12);
    --accent: #2563eb;
    --accent-2: #3b82f6;
    --accent-soft: rgba(37, 99, 235, 0.10);
    --ok: #16a34a;
    --ok-soft: rgba(22, 163, 74, 0.12);
    --err: #dc2626;
    --err-soft: rgba(220, 38, 38, 0.10);
    --chip: var(--accent-soft);

    --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);

    --radius-card: 16px;
    --radius-input: 12px;
    --radius-pill: 999px;

    --transition: 160ms cubic-bezier(.2, .8, .2, 1);

    --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text",
                 "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0f;
      --card: #181818;
      --surface: var(--card);
      --surface-2: #232323;
      --ink: #fafafa;
      --muted: #a1a1aa;
      --soft: #71717a;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --accent: #60a5fa;
      --accent-2: #93c5fd;
      --accent-soft: rgba(96, 165, 250, 0.16);
      --ok: #4ade80;
      --ok-soft: rgba(74, 222, 128, 0.16);
      --err: #f87171;
      --err-soft: rgba(248, 113, 113, 0.16);
      --chip: var(--accent-soft);
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.5);
    }
  }

  * { box-sizing: border-box; }
  html, body { -webkit-text-size-adjust: 100%; }

  /* Visually hide a control while keeping it in the layout & focusable.
     Using `display: none` (or the `hidden` attribute) on a file input
     causes iOS Safari to ignore the `capture` attribute. */
  .vh {
    position: absolute !important;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.005em;
  }

  /* ----- header ------------------------------------------------------ */
  header {
    padding: 18px 24px;
    background: color-mix(in srgb, var(--bg) 70%, transparent);
    backdrop-filter: saturate(180%) blur(10px);
    -webkit-backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header .brand { display: flex; align-items: center; gap: 10px; }
  header .brand .icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: grid; place-items: center;
    color: white;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: var(--shadow-sm);
  }
  header h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.015em;
    color: var(--ink);
  }
  header .sub { color: var(--muted); font-size: 13px; }

  /* ----- tab bar ----------------------------------------------------- */
  .tabs {
    max-width: 1100px;
    margin: 14px auto 0;
    padding: 6px 8px;
    display: inline-flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    box-shadow: var(--shadow-xs);
    position: sticky;
    top: 70px;
    z-index: 9;
    width: max-content;
  }
  .tabs-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    justify-content: center;
  }
  .tab {
    background: transparent;
    color: var(--muted);
    padding: 9px 18px;
    border-radius: var(--radius-pill);
    width: auto;
    margin: 0;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    box-shadow: none;
    border: 0;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: background var(--transition), color var(--transition);
    min-height: 0;
  }
  .tab:hover:not(.active) { background: var(--surface-2); color: var(--ink); }
  .tab.active {
    background: var(--ink);
    color: var(--bg);
  }
  .tab .ico { width: 16px; height: 16px; }

  /* recording indicator on the conversation tab when audio is being captured */
  .tab .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--err);
    margin-left: 2px;
    animation: pulse 1.2s ease-in-out infinite;
    display: none;
  }
  .tab.live .live-dot { display: inline-block; }

  /* ----- main / tab content ------------------------------------------ */
  main {
    max-width: 1100px;
    margin: 18px auto 28px;
    padding: 0 20px;
  }
  .tab-content[hidden] { display: none; }
  .tab-content {
    animation: fade-in 200ms ease-out;
  }
  .card-grid {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 20px;
  }
  @media (max-width: 880px) { .card-grid { grid-template-columns: 1fr; } }

  /* ----- panel (card) ------------------------------------------------ */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    padding: 20px;
    box-shadow: var(--shadow-xs);
    transition: box-shadow var(--transition), border-color var(--transition);
  }
  .panel:hover { box-shadow: var(--shadow-sm); }
  .panel h2 {
    margin: 0 0 14px;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.012em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel h2 .step {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    border-radius: var(--radius-pill);
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
  }
  h3 {
    margin: 18px 0 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  /* ----- drop area --------------------------------------------------- */
  .drop {
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius-input);
    padding: 28px 16px;
    text-align: center;
    color: var(--muted);
    cursor: pointer;
    transition: background var(--transition), border-color var(--transition), color var(--transition);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: var(--surface-2);
  }
  .drop:hover, .drop.drag {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .drop .drop-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: grid; place-items: center;
    background: var(--surface);
    color: var(--accent);
    box-shadow: var(--shadow-xs);
    transition: transform var(--transition);
  }
  .drop:hover .drop-icon { transform: scale(1.04); }
  .drop .drop-text { font-size: 14px; }
  .drop input { display: none; }

  .preview { margin-top: 14px; }
  .preview img {
    width: 100%;
    border-radius: var(--radius-input);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-xs);
    display: block;
  }

  /* ----- buttons (pill-shaped, subtle hover) ------------------------- */
  button {
    background: var(--ink);
    color: var(--bg);
    border: 0;
    padding: 11px 18px;
    border-radius: var(--radius-pill);
    font-family: inherit;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    margin-top: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform var(--transition), opacity var(--transition), background var(--transition);
    box-shadow: var(--shadow-xs);
  }
  button:hover:not([disabled]) { opacity: 0.9; transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  button:active:not([disabled]) { transform: translateY(0); }
  button[disabled] {
    background: var(--surface-2);
    color: var(--soft);
    cursor: not-allowed;
    box-shadow: none;
  }
  button.secondary {
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--border-strong);
  }
  button.danger { background: var(--err); color: #fff; }
  button.danger:hover { background: var(--err); }

  button .ico { width: 16px; height: 16px; flex-shrink: 0; }
  button.btn-lg .ico { width: 18px; height: 18px; }
  button.btn-lg { padding: 14px 22px; font-size: 15.5px; }

  /* ----- spinners ---------------------------------------------------- */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
  @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .btn-spinner {
    width: 14px; height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    opacity: 0.6;
    animation: spin .8s linear infinite;
    display: none;
  }
  button.loading .btn-spinner { display: inline-block; }

  /* ----- status pill ------------------------------------------------- */
  .status {
    margin-top: 14px;
    padding: 10px 12px;
    border-radius: var(--radius-input);
    background: var(--surface-2);
    color: var(--muted);
    font-size: 13.5px;
    display: none;
    border: 1px solid var(--border);
  }
  .status.show { display: block; animation: fade-in 200ms ease-out; }
  .status.err { background: var(--err-soft); color: var(--err); border-color: transparent; }

  /* ----- chip in panel headers (state pill) -------------------------- */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface-2);
    color: var(--muted);
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    font-size: 11.5px;
    font-weight: 600;
    text-transform: lowercase;
    letter-spacing: 0;
    margin-left: auto;
    border: 1px solid var(--border);
  }
  .chip::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--soft);
  }

  /* ----- category chip (kept colorful, lighter style) --------------- */
  .cat-chip {
    display: inline-block;
    padding: 4px 12px;
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0;
    margin-right: 8px;
    vertical-align: middle;
    text-transform: capitalize;
  }
  .cat-utility     { background: rgba( 11, 102, 194, 0.12); color: #0b66c2; }
  .cat-vendor      { background: rgba(161,  75,   0, 0.12); color: #a14b00; }
  .cat-epc         { background: rgba( 91,  62, 184, 0.12); color: #5b3eb8; }
  .cat-sales       { background: rgba( 10, 122,  59, 0.14); color: #0a7a3b; }
  .cat-distributor { background: rgba(156,  83,   0, 0.12); color: #9c5300; }
  .cat-enduser     { background: rgba(163,  20,  39, 0.12); color: #a31427; }
  .cat-other       { background: var(--surface-2);          color: var(--muted); }
  .cat-rationale {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
    line-height: 1.5;
  }
  @media (prefers-color-scheme: dark) {
    .cat-utility     { background: rgba(96, 165, 250, 0.18); color: #93c5fd; }
    .cat-vendor      { background: rgba(251, 146,  60, 0.16); color: #fdba74; }
    .cat-epc         { background: rgba(167, 139, 250, 0.16); color: #c4b5fd; }
    .cat-sales       { background: rgba( 74, 222, 128, 0.16); color: #86efac; }
    .cat-distributor { background: rgba(251, 191,  36, 0.16); color: #fcd34d; }
    .cat-enduser     { background: rgba(248, 113, 113, 0.16); color: #fca5a5; }
  }

  /* ----- top progress bar -------------------------------------------- */
  .progressbar {
    height: 3px;
    width: 100%;
    background: var(--surface-2);
    border-radius: var(--radius-pill);
    overflow: hidden;
    margin: 0 0 14px;
    display: none;
  }
  .progressbar.show { display: block; }
  .progressbar > span {
    display: block;
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: var(--radius-pill);
    animation: bar-slide 1.4s cubic-bezier(.4, 0, .2, 1) infinite;
  }
  @keyframes bar-slide {
    0%   { margin-left: -30%; }
    50%  { margin-left: 50%; }
    100% { margin-left: 100%; }
  }

  /* ----- progress stages (linear, not boxy) -------------------------- */
  .stages {
    list-style: none;
    padding: 0;
    margin: 4px 0 16px;
  }
  .stage {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    color: var(--soft);
    font-size: 14px;
    transition: color var(--transition);
  }
  .stage + .stage { border-top: 1px solid var(--border); }
  .stage .dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border-strong);
    background: var(--surface);
    flex-shrink: 0;
    position: relative;
    transition: border-color var(--transition), background var(--transition);
  }
  .stage .label { flex: 1; }
  .stage .meta { font-size: 12.5px; color: var(--soft); font-variant-numeric: tabular-nums; }

  .stage.active { color: var(--accent); }
  .stage.active .dot {
    border-color: var(--accent);
    border-top-color: transparent;
    animation: spin .9s linear infinite;
  }
  .stage.active .meta { color: var(--accent); animation: pulse 1.5s ease-in-out infinite; }

  .stage.done { color: var(--ok); }
  .stage.done .dot {
    background: var(--ok);
    border-color: var(--ok);
    animation: none;
  }
  .stage.done .dot::after {
    content: ""; position: absolute;
    left: 4px; top: 1px;
    width: 5px; height: 9px;
    border-right: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(45deg);
  }
  .stage.failed { color: var(--err); }
  .stage.failed .dot {
    background: var(--err);
    border-color: var(--err);
    animation: none;
  }
  .stage.failed .dot::after {
    content: "✕"; position: absolute; inset: 0;
    display: grid; place-items: center;
    color: white; font-size: 11px; font-weight: 700;
  }

  /* ----- result body ------------------------------------------------- */
  .field {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 6px 12px;
    padding: 8px 0;
    font-size: 14px;
  }
  .field + .field { border-top: 1px solid var(--border); }
  .field b { color: var(--muted); font-weight: 500; font-size: 13px; }
  .field a { color: var(--accent); text-decoration: none; }
  .field a:hover { text-decoration: underline; }
  .empty { color: var(--soft); font-style: italic; }

  ul.bullets { margin: 4px 0 0 0; padding-left: 0; list-style: none; }
  ul.bullets li {
    margin: 6px 0;
    padding-left: 18px;
    position: relative;
    line-height: 1.55;
  }
  ul.bullets li::before {
    content: "";
    position: absolute;
    left: 4px; top: 9px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.6;
  }

  .pdf-row { margin-top: 16px; display: flex; gap: 10px; }
  .pdf-row a { flex: 1; display: block; text-align: center; text-decoration: none; }

  details { margin-top: 8px; }
  details summary { cursor: pointer; color: var(--muted); font-size: 12px; }
  pre {
    white-space: pre-wrap;
    background: var(--surface-2);
    padding: 12px;
    border-radius: var(--radius-input);
    font-size: 12px;
    overflow-x: auto;
    border: 1px solid var(--border);
  }
  .meta-line {
    font-size: 11.5px;
    color: var(--soft);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  /* ----- live conversation panel ------------------------------------- */
  .full-row { grid-column: 1 / -1; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .row > * { flex: 0 0 auto; }
  .row .grow { flex: 1 1 auto; min-width: 200px; }
  select, input[type="text"] {
    border: 1px solid var(--border-strong);
    background: var(--surface);
    padding: 10px 12px;
    border-radius: var(--radius-input);
    font: inherit;
    font-size: 14px;
    color: var(--ink);
    min-width: 240px;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  select:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  .rec-light {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #fff;
    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;
    animation: pulse 1.2s ease-in-out infinite;
  }

  /* Recording-mode compaction: hide the card selector + status while we're
     recording so the timer + Stop button fit on a phone without scrolling.
     Status is still used during upload/transcribe phases. */
  .recording .row .grow { display: none; }
  .recording .status { display: none; }
  .rec-display {
    text-align: center;
    padding: 8px 0 4px;
  }
  .rec-display .rec-timer {
    font-family: var(--font-mono);
    font-size: 36px;
    font-weight: 600;
    color: var(--accent-2);
    letter-spacing: 0.04em;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }
  .rec-display .rec-hint {
    color: var(--muted);
    margin-top: 4px;
    font-size: 13px;
  }
  @media (max-width: 640px) {
    .rec-display { padding: 6px 0 2px; }
    .rec-display .rec-timer { font-size: 30px; }
    .rec-display .rec-hint { font-size: 12px; }
    .recording .transcript { min-height: 80px; padding: 8px; }
  }

  .transcript {
    margin-top: 14px;
    padding: 16px;
    background: var(--surface-2);
    border-radius: var(--radius-input);
    min-height: 140px;
    max-height: 320px;
    overflow-y: auto;
    font-size: 14.5px;
    line-height: 1.6;
    white-space: pre-wrap;
    border: 1px solid var(--border);
  }
  .transcript .interim { color: var(--soft); font-style: italic; }
  .transcript:empty::before {
    content: "Live transcript will appear here once you click Start…";
    color: var(--soft);
    font-style: italic;
  }

  /* ----- summary blocks (chat-card style) ---------------------------- */
  .summary-block { margin-top: 14px; animation: fade-in 240ms ease-out; }
  .summary-block .one-para {
    background: var(--accent-soft);
    color: var(--ink);
    padding: 14px 16px;
    border-radius: var(--radius-input);
    margin: 6px 0 12px;
    line-height: 1.6;
  }
  .email-draft {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-input);
    padding: 14px 16px;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 13.5px;
    line-height: 1.6;
    font-family: var(--font-sans);
  }

  /* ----- skeleton placeholders --------------------------------------- */
  .skeleton {
    background: linear-gradient(90deg,
      var(--surface-2) 25%,
      color-mix(in srgb, var(--surface-2) 50%, var(--bg)) 37%,
      var(--surface-2) 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
    border-radius: 6px;
    height: 14px;
    margin: 8px 0;
  }
  .skeleton.short { width: 40%; }
  .skeleton.long  { width: 90%; }
  @keyframes shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: 0 0; }
  }

  /* ====================================================================
     Phone-friendly tweaks (≤640px)
     ==================================================================== */
  @media (max-width: 640px) {
    body { font-size: 15px; }
    header { padding: 14px 16px; }
    header h1 { font-size: 16px; }
    header .sub { font-size: 12px; }
    #apiHint { display: none; }

    main { margin: 12px auto; padding: 0 14px; }
    .card-grid { gap: 12px; }
    .tabs { top: 56px; padding: 4px 6px; }
    .tab { padding: 8px 14px; font-size: 13.5px; }
    .panel { padding: 16px; border-radius: 14px; }
    .panel h2 { font-size: 15px; }

    .drop { padding: 22px 14px; }
    button { min-height: 46px; padding: 13px 18px; }

    .field {
      grid-template-columns: 1fr;
      gap: 2px;
      padding: 8px 0;
    }

    .row { gap: 8px; }

    select, input[type="text"] {

  }
  @media (max-width: 380px) {
    .panel { padding: 14px; }

    header h1 { font-size: 15px; }
  }
</style>
</head>

<script>
// Same-origin when served by FastAPI at /app/, else allow override.
const API_BASE = (location.pathname.startsWith("/app") ? "" : "http://localhost:8000");
document.getElementById("apiHint").textContent = API_BASE ? "API: " + API_BASE : "API: same origin";

// ---- tab switching --------------------------------------------------------
// In-app tabs (not browser tabs). Switching here is just CSS visibility, so
// active recording / polling continues regardless of which tab is on screen.
const TAB_BTNS = {
  card:         document.getElementById("tab-card-btn"),
  conversation: document.getElementById("tab-conv-btn"),
};
const TAB_PANES = {
  card:         document.getElementById("tab-card"),
  conversation: document.getElementById("tab-conversation"),
};

function setActiveTab(name, { fromHashChange = false } = {}) {
  if (!TAB_PANES[name]) name = "card";
  for (const k of Object.keys(TAB_PANES)) {
    const isActive = k === name;
    TAB_BTNS[k].classList.toggle("active", isActive);
    TAB_BTNS[k].setAttribute("aria-selected", isActive ? "true" : "false");
    TAB_PANES[k].hidden = !isActive;
  }
  if (!fromHashChange) {
    history.replaceState(null, "", "#" + name);
  }
  // Keep top of new view in view; iOS Safari can leave you mid-scroll otherwise.
  window.scrollTo({ top: 0, behavior: "smooth" });
}
for (const [name, btn] of Object.entries(TAB_BTNS)) {
  btn.addEventListener("click", () => setActiveTab(name));
}
window.addEventListener("hashchange", () => {
  const target = (location.hash || "#card").replace(/^#/, "");
  setActiveTab(target, { fromHashChange: true });
});
// Honor hash on first load.
setActiveTab((location.hash || "#card").replace(/^#/, ""), { fromHashChange: true });

// Reflect "currently recording" on the conversation tab so the user sees a
// pulsing dot even when they've navigated to the card tab.
function setConvTabLive(on) {
  TAB_BTNS.conversation.classList.toggle("live", !!on);
}

// Two file inputs to give iOS Safari unambiguous "camera" vs "library" hints.
const cameraFile  = document.getElementById("cameraFile");
const libraryFile = document.getElementById("libraryFile");
// Tapping the drop zone opens the camera; the library link sits below.
const fileInput = cameraFile;  // alias so legacy code reads naturally
const libraryBtn = document.getElementById("pickLibraryBtn");
const drop = document.getElementById("drop");
const preview = document.getElementById("preview");
const submitBtn = document.getElementById("submit");
const submitLabel = document.getElementById("submitLabel");
const statusEl = document.getElementById("status");
const resultPanel = document.getElementById("resultPanel");
const resultEl = document.getElementById("result");
const chip = document.getElementById("statusChip");
const stagesEl = document.getElementById("stages");
const progressbar = document.getElementById("progressbar");
function showProgress(on) { progressbar.classList.toggle("show", !!on); }

let chosenFile = null;
let stageStart = {};       // monotonic ms per stage key, for elapsed timers
let elapsedTimer = null;   // setInterval handle

// ---- helpers --------------------------------------------------------------

function setStatus(msg, isErr=false) {
  statusEl.textContent = msg;
  statusEl.classList.toggle("show", !!msg);
  statusEl.classList.toggle("err", isErr);
}

function escapeHtml(s) {
  return (s ?? "").toString().replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

function setBtnLoading(loading, label) {
  submitBtn.classList.toggle("loading", !!loading);
  submitBtn.disabled = !!loading;
  if (label) submitLabel.textContent = label;
}

// ---- stages widget --------------------------------------------------------

const STAGE_ORDER = ["upload", "extract", "research", "brief"];

function stageEl(key) {
  return stagesEl.querySelector(`.stage[data-key="${key}"]`);
}
function metaEl(key) { return document.getElementById(`meta-${key}`); }

function setStage(key, state, metaText) {
  const el = stageEl(key);
  if (!el) return;
  const wasActive = el.classList.contains("active");
  el.classList.remove("active", "done", "failed");
  if (state) el.classList.add(state);
  if (state === "active") {
    // Only set the start time on the first activation; subsequent polls
    // re-call setStage("...", "active") and must NOT reset the timer.
    if (!stageStart[key]) stageStart[key] = performance.now();
    if (!wasActive) metaEl(key).textContent = metaText || "running…";
  } else if (state === "done") {
    const ms = stageStart[key] ? Math.round(performance.now() - stageStart[key]) : null;
    metaEl(key).textContent = ms != null ? `${(ms/1000).toFixed(1)}s` : (metaText || "");
  } else if (state === "failed") {
    metaEl(key).textContent = metaText || "failed";
  } else {
    metaEl(key).textContent = "";
  }
}

function resetStages() {
  STAGE_ORDER.forEach(k => setStage(k, null));
  if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
  stageStart = {};
  tickerKey = null;
}

let tickerKey = null;
function startElapsedTicker(activeKey) {
  // Idempotent: if already ticking on this key, don't restart.
  if (tickerKey === activeKey && elapsedTimer) return;
  if (elapsedTimer) clearInterval(elapsedTimer);
  tickerKey = activeKey;
  const tick = () => {
    const t = stageStart[activeKey];
    if (!t) return;
    const s = ((performance.now() - t) / 1000).toFixed(0);
    metaEl(activeKey).textContent = `${s}s`;
  };
  tick();  // paint immediately so we don't wait a second for the first update
  elapsedTimer = setInterval(tick, 1000);
}

// Map a backend status into the stages widget.
function applyStatusToStages(status, hasExtracted, hasResearch, hasPdf) {
  // upload is set elsewhere (right after POST returns).
  switch (status) {
    case "pending":
    case "extracting":
      setStage("extract", "active");
      startElapsedTicker("extract");
      break;
    case "researching":
      if (!stageEl("extract").classList.contains("done")) setStage("extract", "done");
      setStage("research", "active");
      startElapsedTicker("research");
      break;
    case "ready":
      ["extract","research","brief"].forEach(k => setStage(k, "done"));
      if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
      break;
    case "error":
      // mark whichever step is currently active as failed
      const cur = stagesEl.querySelector(".stage.active");
      if (cur) setStage(cur.dataset.key, "failed");
      if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
      break;
  }
}

// ---- file pickers ---------------------------------------------------------

// The drop zone is a plain div now (not a <label>) to avoid the double-fire
// case where the label's native input-trigger and our explicit fileInput.click()
// both ran, opening the picker twice.
drop.addEventListener("click", () => fileInput.click());
drop.addEventListener("keydown", e => {
  if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileInput.click(); }
});

["dragenter","dragover"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("drag"); })
);
["dragleave","drop"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("drag"); })
);
drop.addEventListener("drop", e => {
  if (e.dataTransfer?.files?.[0]) handleFile(e.dataTransfer.files[0]);
});
// Both inputs go through handleFile.
cameraFile.addEventListener("change", () => {
  if (cameraFile.files?.[0]) handleFile(cameraFile.files[0]);
});
libraryFile.addEventListener("change", () => {
  if (libraryFile.files?.[0]) handleFile(libraryFile.files[0]);
});

// Secondary button below the drop zone: open the photo library (no `capture`).
if (libraryBtn) {
  libraryBtn.addEventListener("click", (e) => {
    e.preventDefault();
    libraryFile.click();
  });
}

function handleFile(f) {
  chosenFile = f;
  const url = URL.createObjectURL(f);
  preview.innerHTML = `<img src="${url}" alt="card preview" />`;
  submitBtn.disabled = false;
  document.getElementById("dropText").textContent = f.name;
  setStatus("");
  // Reset both inputs so picking the same file again still fires `change`.
  cameraFile.value = "";
  libraryFile.value = "";
}

// ---- submit + poll --------------------------------------------------------

submitBtn.addEventListener("click", async () => {
  if (!chosenFile) return;
  setBtnLoading(true, "Uploading…");
  setStatus("");
  resultPanel.style.display = "";
  showProgress(true);
  chip.textContent = "uploading";
  resetStages();
  setStage("upload", "active");
  renderSkeleton();

  try {
    const fd = new FormData();
    fd.append("photo", chosenFile);
    const res = await fetch(API_BASE + "/cards", { method: "POST", body: fd });
    if (!res.ok) throw new Error("Upload failed: " + res.status + " " + (await res.text()));
    const { id } = await res.json();
    setStage("upload", "done");
    chip.textContent = "pending";
    setBtnLoading(true, "Analyzing…");
    pollUntilReady(id);
  } catch (err) {
    showProgress(false);
    setStatus(err.message || String(err), true);
    setStage("upload", "failed", "upload failed");
    setBtnLoading(false, "Analyze card");
  }
});

async function pollUntilReady(id) {
  // Up to ~6 minutes, polling every 2s.
  for (let i = 0; i < 180; i++) {
    await sleep(2000);
    let data;
    try {
      const r = await fetch(API_BASE + "/cards/" + id);
      if (!r.ok) throw new Error("status fetch failed: " + r.status);
      data = await r.json();
    } catch (err) {
      setStatus("Lost connection while polling. Retrying…", true);
      continue;
    }
    chip.textContent = data.status;
    applyStatusToStages(data.status, !!data.extracted, !!data.research, !!data.pdf_url);
    renderPartial(data);
    if (data.status === "ready") {
      showProgress(false);
      setBtnLoading(false, "Analyze another");
      setStatus("");
      return;
    }
    if (data.status === "error") {
      showProgress(false);
      setStatus(data.error || "Pipeline failed.", true);
      setBtnLoading(false, "Try again");
      return;
    }
  }
  showProgress(false);
  setStatus("Timed out waiting for result.", true);
  setBtnLoading(false, "Try again");
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ---- result rendering -----------------------------------------------------

function renderField(label, value) {
  if (value === null || value === undefined || value === "" || (Array.isArray(value) && value.length === 0)) {
    return `<div class="field"><b>${label}</b><span class="empty">—</span></div>`;
  }
  const text = Array.isArray(value) ? value.join(", ") : value;
  return `<div class="field"><b>${label}</b><span>${escapeHtml(text)}</span></div>`;
}

function renderLinkField(label, url) {
  if (!url) return `<div class="field"><b>${label}</b><span class="empty">—</span></div>`;
  const href = normalizeUrl(url);
  const safe = escapeHtml(url);
  return `<div class="field"><b>${label}</b><span><a href="${escapeHtml(href)}" target="_blank" rel="noopener">${safe}</a></span></div>`;
}

function normalizeUrl(u) {
  // Cards often print "acme.example" without a scheme. Prepend https:// so
  // the link actually opens.
  if (!u) return u;
  if (/^https?:\/\//i.test(u)) return u;
  return "https://" + u.replace(/^\/+/, "");
}

function titleDisplay(cardTitle, verified) {
  if (!verified) return cardTitle;
  if (!cardTitle) return verified + " (verified)";
  // Same string -> just show it once.
  if (cardTitle.trim().toLowerCase() === verified.trim().toLowerCase()) return cardTitle;
  return `${cardTitle} (verified: ${verified})`;
}

function renderBullets(items) {
  if (!items || !items.length) return `<div class="empty">—</div>`;
  return `<ul class="bullets">${items.map(i => `<li>${escapeHtml(i)}</li>`).join("")}</ul>`;
}

function categoryClass(cat) {
  switch ((cat || "").toLowerCase()) {
    case "utility":               return "cat-utility";
    case "vendor":                return "cat-vendor";
    case "epc":                   return "cat-epc";
    case "sales representatives": return "cat-sales";
    case "distributors":          return "cat-distributor";
    case "end users":             return "cat-enduser";
    default:                      return "cat-other";
  }
}
function renderCategory(cat, rationale) {
  if (!cat) return "";
  return `
    <div style="margin: 6px 0 10px;">
      <span class="cat-chip ${categoryClass(cat)}">${escapeHtml(cat)}</span>
      ${rationale ? `<div class="cat-rationale">${escapeHtml(rationale)}</div>` : ""}
    </div>`;
}

function renderSkeleton() {
  resultEl.innerHTML = `
    <h3 style="margin-top:8px;">Contact</h3>
    <div class="skeleton long"></div>
    <div class="skeleton short"></div>
    <div class="skeleton long"></div>
    <h3 style="margin-top:14px;">Company brief</h3>
    <div class="skeleton long"></div>
    <div class="skeleton long"></div>
    <div class="skeleton short"></div>
  `;
}

function renderPartial(data) {
  const ex = data.extracted || {};
  const r = data.research || {};
  const showResearch = data.research || data.status === "researching" || data.status === "ready";

  resultEl.innerHTML = `
    <div class="meta-line">id ${escapeHtml(data.id)} · created ${escapeHtml(data.created_at)}</div>

    <h3 style="margin-top:14px;">Contact</h3>
    ${data.extracted ? `
      ${renderField("Name", ex.name)}
      ${renderField("Title", titleDisplay(ex.title, r.contact_title_verified))}
      ${renderField("Company", ex.company)}
      ${renderField("Emails", ex.emails)}
      ${renderField("Phones", ex.phones)}
      ${renderLinkField("Website", r.company_website || ex.website)}
      ${renderField("Address", ex.address)}
      ${renderLinkField("LinkedIn", r.contact_linkedin || ex.linkedin)}
      ${ex.notes ? renderField("Notes", ex.notes) : ""}
    ` : `<div class="skeleton long"></div><div class="skeleton short"></div><div class="skeleton long"></div>`}

    <h3 style="margin-top:14px;">Company brief</h3>
    ${data.research ? `
      ${renderCategory(r.company_category, r.category_rationale)}
      ${renderField("One-liner", r.one_liner)}
      ${renderField("Industry", r.industry)}
      ${renderField("Size", r.estimated_size)}
      ${renderField("Products", r.products)}

      <h3 style="margin-top:14px;">Recent news</h3>
      ${renderBullets(r.recent_news)}

      <h3 style="margin-top:14px;">Likely pain points</h3>
      ${renderBullets(r.pain_points)}

      <h3 style="margin-top:14px;">Suggested opening questions</h3>
      ${renderBullets(r.opening_questions)}

      ${r.sources && r.sources.length ? `
        <h3 style="margin-top:14px;">Sources</h3>
        ${renderBullets(r.sources)}
      ` : ""}
    ` : `<div class="skeleton long"></div><div class="skeleton long"></div><div class="skeleton short"></div>`}

    ${data.pdf_url ? `
      <div class="pdf-row">
        <a href="${API_BASE}${data.pdf_url}" target="_blank"><button class="secondary">Open PDF</button></a>
        <a href="${API_BASE}${data.pdf_url}" download><button>Download PDF</button></a>
      </div>` : ""}

    ${data.error ? `<details open><summary>Error details</summary><pre>${escapeHtml(data.error)}</pre></details>` : ""}
  `;
}

// ===========================================================================
// Slice 2: Live conversation (MediaRecorder + server-side Whisper + Claude)
// ===========================================================================

const cardSelect = document.getElementById("cardSelect");
const startBtn = document.getElementById("startBtn");
const stopBtn  = document.getElementById("stopBtn");
const convChip = document.getElementById("convChip");
const convPanel = document.getElementById("convPanel");
const convStatus = document.getElementById("convStatus");
const transcriptEl = document.getElementById("transcript");
const summaryEl = document.getElementById("summary");

let mediaRecorder = null;
let mediaStream = null;
let audioChunks = [];
let convId = null;
let recStartMs = 0;
let recTimer = null;

function setConvStatus(msg, isErr=false) {
  convStatus.textContent = msg || "";
  convStatus.classList.toggle("show", !!msg);
  convStatus.classList.toggle("err", isErr);
}

function fmtTime(ms) {
  const total = Math.max(0, Math.floor(ms / 1000));
  const m = Math.floor(total / 60);
  const s = total % 60;
  return `${m}:${String(s).padStart(2, "0")}`;
}

function paintTimer() {
  const elapsed = Date.now() - recStartMs;
  // Render the wrapper + hint once, then update only the timer text on each
  // tick. Avoids flashing and keeps DOM stable.
  let timerNode = document.getElementById("recTimerText");
  if (!timerNode) {
    transcriptEl.innerHTML = `
      <div class="rec-display">
        <div class="rec-timer" id="recTimerText">${fmtTime(elapsed)}</div>
        <div class="rec-hint">Recording — tap <b>Stop</b> to finish</div>
      </div>`;
  } else {
    timerNode.textContent = fmtTime(elapsed);
  }
}

async function loadCards() {
  try {
    const r = await fetch(API_BASE + "/cards");
    if (!r.ok) return;
    const cards = await r.json();
    const current = cardSelect.value;
    cardSelect.innerHTML = `<option value="">— None —</option>` +
      cards.map(c => {
        const label = `${c.name || "(unknown)"} · ${c.company || "—"} (${c.id})`;
        return `<option value="${escapeHtml(c.id)}">${escapeHtml(label)}</option>`;
      }).join("");
    if (current) cardSelect.value = current;
  } catch (_) { /* non-fatal */ }
}
loadCards();
// Re-pull cards after a successful card analysis so the dropdown stays fresh.
const _origPollUntilReady = pollUntilReady;
pollUntilReady = async function(id) {
  await _origPollUntilReady(id);
  loadCards();
};

function pickRecorderMime() {
  // Prefer formats Whisper handles natively. Browsers will typically support
  // one of these; fall back to the browser default (Safari often returns
  // audio/mp4, Chromium audio/webm;codecs=opus).
  const candidates = [
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/mp4",
    "audio/aac",
    "audio/ogg;codecs=opus",
  ];
  if (typeof MediaRecorder === "undefined" || !MediaRecorder.isTypeSupported) {
    return undefined;
  }
  for (const m of candidates) {
    try { if (MediaRecorder.isTypeSupported(m)) return m; } catch (_) {}
  }
  return undefined;
}

function suffixForMime(mime) {
  const m = (mime || "").toLowerCase();
  if (m.includes("mp4") || m.includes("aac") || m.includes("m4a")) return ".mp4";
  if (m.includes("ogg")) return ".ogg";
  if (m.includes("wav")) return ".wav";
  if (m.includes("mpeg") || m.includes("mp3")) return ".mp3";
  return ".webm";
}

async function startRecording() {
  if (typeof MediaRecorder === "undefined") {
    setConvStatus("This browser doesn't support audio recording.", true);
    return false;
  }
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    setConvStatus("Microphone access denied: " + (err && err.message || err), true);
    return false;
  }
  audioChunks = [];
  const mime = pickRecorderMime();
  try {
    mediaRecorder = mime ? new MediaRecorder(mediaStream, { mimeType: mime })
                         : new MediaRecorder(mediaStream);
  } catch (err) {
    setConvStatus("Could not start recorder: " + err.message, true);
    return false;
  }
  mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) audioChunks.push(e.data); };
  // Request a chunk every second so we don't lose audio if the tab is closed mid-call.
  mediaRecorder.start(1000);

  recStartMs = Date.now();
  paintTimer();
  recTimer = setInterval(paintTimer, 500);
  return true;
}

function stopRecording() {
  return new Promise((resolve) => {
    if (!mediaRecorder) return resolve(null);
    const onStop = () => {
      if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
      const mime = mediaRecorder.mimeType || "audio/webm";
      const blob = new Blob(audioChunks, { type: mime });
      if (recTimer) { clearInterval(recTimer); recTimer = null; }
      resolve(blob);
    };
    mediaRecorder.addEventListener("stop", onStop, { once: true });
    try { mediaRecorder.stop(); } catch (_) { onStop(); }
  });
}

startBtn.addEventListener("click", async () => {
  transcriptEl.innerHTML = "";
  summaryEl.innerHTML = "";
  setConvStatus("");

  // Start backend session first so we have an ID to attach.
  try {
    const cardId = cardSelect.value || null;
    const res = await fetch(API_BASE + "/conversations", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ card_id: cardId }),
    });
    if (!res.ok) throw new Error("Could not start conversation: " + res.status);
    const body = await res.json();
    convId = body.id;
  } catch (err) {
    setConvStatus(err.message || String(err), true);
    return;
  }

  const ok = await startRecording();
  if (!ok) return;

  convChip.textContent = "recording";
  setConvTabLive(true);                    // show pulsing dot on Conversation tab
  convPanel.classList.add("recording");    // hides card selector + status; tightens timer area
  startBtn.style.display = "none";
  stopBtn.style.display = "";
  // Status hint is implicit in the timer area now.
});

stopBtn.addEventListener("click", async () => {
  convChip.textContent = "uploading";
  setConvTabLive(false);
  convPanel.classList.remove("recording");   // restore card selector + status visibility
  stopBtn.style.display = "none";
  startBtn.style.display = "";
  setConvStatus("Stopping recording…");

  const blob = await stopRecording();
  transcriptEl.innerHTML = `<div style="text-align:center; padding:14px; color:var(--muted);">Audio captured (${blob ? (blob.size/1024/1024).toFixed(2) : "?"} MB). Sending to Whisper…</div>`;

  if (!blob || blob.size === 0) {
    setConvStatus("No audio captured. Was the mic muted?", true);
    return;
  }
  if (!convId) {
    setConvStatus("Lost conversation id. Click Start to begin a new one.", true);
    return;
  }

  setConvStatus(`Uploading audio (${(blob.size/1024/1024).toFixed(2)} MB)…`);
  const fd = new FormData();
  const filename = "conversation" + suffixForMime(blob.type);
  fd.append("audio", blob, filename);

  try {
    const res = await fetch(API_BASE + `/conversations/${convId}/audio`, {
      method: "POST",
      body: fd,
    });
    if (!res.ok) throw new Error("Upload failed: " + res.status + " " + (await res.text()));
    setConvStatus("Audio uploaded. Transcribing with Whisper…");
    pollConversation(convId);
  } catch (err) {
    convChip.textContent = "error";
    setConvStatus(err.message || String(err), true);
  }
});

async function pollConversation(id) {
  // ~5 minutes — Whisper + Claude can take a bit on long calls.
  let renderedTranscript = false;
  for (let i = 0; i < 150; i++) {
    await sleep(2000);
    let data;
    try {
      const r = await fetch(API_BASE + "/conversations/" + id);
      if (!r.ok) throw new Error("status fetch failed: " + r.status);
      data = await r.json();
    } catch (err) {
      setConvStatus("Lost connection while polling. Retrying…", true);
      continue;
    }
    convChip.textContent = data.status;

    if (data.transcript && !renderedTranscript) {
      transcriptEl.innerHTML = escapeHtml(data.transcript);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
      renderedTranscript = true;
    }

    if (data.status === "transcribing") {
      setConvStatus("Transcribing audio with Whisper…");
    } else if (data.status === "summarizing") {
      setConvStatus("Summarizing with Claude…");
    }

    if (data.status === "ready") {
      setConvStatus("");
      if (data.transcript && !renderedTranscript) {
        transcriptEl.innerHTML = escapeHtml(data.transcript);
      }
      renderSummary(data);
      return;
    }
    if (data.status === "error") {
      setConvStatus(data.error || "Pipeline failed.", true);
      return;
    }
  }
  setConvStatus("Timed out waiting for summary.", true);
}

function renderSummary(data) {
  const s = data.summary || {};
  summaryEl.innerHTML = `
    <div class="summary-block">
      <h3 style="margin-top:14px;">Summary</h3>
      <div class="one-para">${escapeHtml(s.summary || "—")}</div>

      <h3>Key topics</h3>
      ${renderBullets(s.key_topics)}

      <h3>Customer concerns</h3>
      ${renderBullets(s.customer_concerns)}

      <h3>Commitments</h3>
      ${renderBullets(s.commitments)}

      <h3>Next steps</h3>
      ${renderBullets(s.next_steps)}

      ${s.follow_up_email ? `
        <h3>Draft follow-up email</h3>
        <div class="email-draft">${escapeHtml(s.follow_up_email)}</div>
        <div style="margin-top:8px;">
          <button class="secondary" id="copyEmailBtn">Copy email to clipboard</button>
        </div>
      ` : ""}

      ${data.pdf_url ? `
        <div class="pdf-row" style="margin-top:14px;">
          <a href="${API_BASE}${data.pdf_url}" target="_blank"><button class="secondary">Open PDF</button></a>
          <a href="${API_BASE}${data.pdf_url}" download><button>Download PDF</button></a>
        </div>` : ""}
    </div>
  `;
  const copyBtn = document.getElementById("copyEmailBtn");
  if (copyBtn) {
    copyBtn.addEventListener("click", async () => {
      try { await navigator.clipboard.writeText(s.follow_up_email); copyBtn.textContent = "Copied"; }
      catch { copyBtn.textContent = "Copy failed — select & copy manually"; }
    });
  }
}
</script>
